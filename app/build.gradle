plugins {
    id 'com.android.application'
}

android {
    namespace 'me.themishka.pocketmind'
    compileSdk 35

    defaultConfig {
        applicationId 'me.themishka.pocketmind'
        minSdk 26
        targetSdk 35
        versionCode 2
        versionName '2.0.0-alpha1'

        ndk {
            abiFilters 'arm64-v8a'
        }
        externalNativeBuild {
            cmake {
                cppFlags '-std=c++17 -O3 -ffast-math'
                arguments '-DANDROID_STL=c++_shared', '-DGGML_OPENMP=OFF', '-DGGML_NATIVE=OFF', '-DGGML_CPU_ARM_ARCH=armv8-a'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

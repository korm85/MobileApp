name: Build LocalArtifacts APK

on:
  push:
    branches:
      - codex/local-artifacts-apk
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-artifacts
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: local-artifacts/package.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JavaScript and native dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: local-artifacts/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalArtifacts-debuggable-release-apk
          path: local-artifacts/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
